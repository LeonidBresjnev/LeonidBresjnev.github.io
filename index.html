
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jacob Simonsen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f0;
      --ink: #182026;
      --muted: #4d5a66;
      --card: rgba(255, 255, 255, 0.78);
      --border: rgba(20, 32, 40, 0.12);
      --accent: #0f766e;
      --accent-2: #fb923c;
      --shadow: 0 18px 45px rgba(15, 32, 44, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 10%, #fde68a 0%, rgba(253, 230, 138, 0) 38%),
        radial-gradient(circle at 92% 15%, #bfdbfe 0%, rgba(191, 219, 254, 0) 35%),
        linear-gradient(155deg, #f7f5f0 0%, #e9f2f2 55%, #f7f5f0 100%);
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .shell {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
      animation: rise 650ms ease-out;
    }

    .hero {
      padding: 42px 34px 26px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: 20px;
      top: 20px;
      width: 130px;
      height: 130px;
      border-radius: 999px;
      background: conic-gradient(from 180deg, var(--accent), var(--accent-2), var(--accent));
      opacity: 0.12;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 12px 0 0;
      max-width: 55ch;
      font-size: 1.04rem;
      line-height: 1.55;
      color: var(--muted);
    }

    .projects {
      list-style: none;
      margin: 0;
      padding: 22px 22px 28px;
      display: grid;
      gap: 12px;
    }

    .projects li {
      transform: translateY(16px);
      opacity: 0;
      animation: reveal 500ms ease forwards;
    }

    .projects li:nth-child(2) { animation-delay: 90ms; }
    .projects li:nth-child(3) { animation-delay: 180ms; }

    .project-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      text-decoration: none;
      font-weight: 500;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .project-link:hover,
    .project-link:focus-visible {
      transform: translateY(-2px);
      border-color: color-mix(in oklab, var(--accent) 35%, white);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.17);
      outline: none;
    }

    .arrow {
      font-size: 1.12rem;
      color: var(--accent);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 14px;
      }

      .hero {
        padding: 28px 20px 18px;
      }

      .projects {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Jacob Simonsen</h1>
      <p class="lead">A small collection of my GitHub Pages projects that you can open directly from here.</p>
    </section>

    <ul class="projects">
      <li>
        <a class="project-link" href="https://leonidbresjnev.github.io/rubiks-cube/">
          <span>Rubik Cube Solver</span>
          <span class="arrow" aria-hidden="true">&rarr;</span>
        </a>
      </li>
      <li>
        <a class="project-link" href="https://leonidbresjnev.github.io/funwithwasm/">
          <span>Fun with WASM</span>
          <span class="arrow" aria-hidden="true">&rarr;</span>
        </a>
      </li>
      <li>
        <a class="project-link" href="https://leonidbresjnev.github.io/bibliografi/">
          <span>Bibliografi</span>
          <span class="arrow" aria-hidden="true">&rarr;</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
